apiVersion: v1
kind: Secret
metadata:
  name: analytics-secret
  namespace: analytics
type: Opaque
stringData:
  CLICKHOUSE_ADDR: "clickhouse.analytics.svc.cluster.local:9000"
  CLICKHOUSE_USER: "default"
  CLICKHOUSE_PASSWORD: ""
  CLICKHOUSE_DB: "analytics"
  FLUSH_SIZE: "500"
  FLUSH_INTERVAL: "2s"
  SESSION_WINDOW: "30m"
  INSERT_TIMEOUT: "5s"
  HTTP_ADDR: ":8080"