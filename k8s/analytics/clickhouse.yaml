apiVersion: v1
kind: Service
metadata:
  name: clickhouse
  namespace: analytics
spec:
  type: ClusterIP
  ports:
    - name: native
      port: 9000
      targetPort: 9000
    - name: http
      port: 8123
      targetPort: 8123
  selector:
    app: clickhouse
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: clickhouse
  namespace: analytics
spec:
  serviceName: clickhouse
  replicas: 1
  selector:
    matchLabels:
      app: clickhouse
  template:
    metadata:
      labels:
        app: clickhouse
    spec:
      nodeSelector:
        workload: analytics
      tolerations:
        - key: "workload"
          operator: "Equal"
          value: "analytics"
          effect: "NoSchedule"
      containers:
        - name: clickhouse
          image: clickhouse/clickhouse-server:24.8
          ports:
            - containerPort: 9000
            - containerPort: 8123
          envFrom:
            - secretRef:
                name: env
          volumeMounts:
            - name: clickhouse-data
              mountPath: /var/lib/clickhouse
            - name: clickhouse-init
              mountPath: /docker-entrypoint-initdb.d
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "2"
              memory: "4Gi"
      volumes:
        - name: clickhouse-init
          configMap:
            name: clickhouse-init-sql
  volumeClaimTemplates:
    - metadata:
        name: clickhouse-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 50Gi
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: clickhouse-init-sql
  namespace: analytics
data:
  schema.sql: |
    CREATE DATABASE IF NOT EXISTS analytics;

    CREATE TABLE IF NOT EXISTS analytics.analytics_events (
      timestamp DateTime,
      event_name LowCardinality(String),
      entity_type LowCardinality(String),
      entity_id String,
      actor_user_id String,
      actor_entity_id String,
      actor_entity_type LowCardinality(String),
      session_id String,
      source LowCardinality(String),
      platform LowCardinality(String),
      app_version String,
      device_type LowCardinality(String),
      user_agent String,
      ip_hash String,
      properties JSON
    ) ENGINE = MergeTree
    PARTITION BY toYYYYMM(timestamp)
    ORDER BY (event_name, entity_type, entity_id, timestamp);
